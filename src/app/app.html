<div class="notepad-workspace">

  <div class="spinner-overlay" *ngIf="notesService.isLoading()">
    <div class="spinner"></div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM12 6H17V8H12V6ZM17 11H12V13H17V11ZM17 16H12V18H17V16ZM7 6H10V9H7V6ZM7 11H10V14H7V11ZM7 16H10V19H7V16Z" fill="#0EA5E9"/>
        </svg>
      </div>
      <div class="brand-names">
        <span class="title-main">Online</span>
        <span class="title-sub">Notepad</span>
      </div>
    </div>

    <button class="btn-new-note" (click)="currentView = 'editor'; startNewNote()">
      <i class="bi bi-plus-lg"></i> Nueva Nota
    </button>

    <div class="sidebar-scroller">
      <div class="menu-section">
        <div class="section-heading">
          <span>Notas</span>
          <a (click)="notesService.fetchNotes()" class="action-link">Ver todo</a>
        </div>
        
        <div class="notes-stack">
          <div 
            *ngFor="let item of notesService.notes()" 
            class="note-tile"
            [class.tile-active]="selectedNote()?.id === item.id && currentView === 'editor'"
            (click)="currentView = 'editor'; selectNote(item)"
          >
            <div class="tile-meta">
              <h4>{{ item.titulo || 'Documento sin título' }}</h4>
            </div>
            <button class="tile-delete" (click)="confirmDelete(item.id, $event)">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="menu-section">
        <div class="section-heading">Otras herramientas</div>
        <ul class="static-menu-list">
          <li (click)="currentView = 'editor'"><i class="bi bi-type-strikethrough"></i> Parafraseador</li>
          <li (click)="currentView = 'pdf'" [class.li-active]="currentView === 'pdf'">
            <i class="bi bi-filetype-pdf"></i> Texto a PDF
          </li>
          <li (click)="currentView = 'editor'"><i class="bi bi-blockquote-left"></i> Resumidor De Textos</li>
        </ul>
      </div>

      <div class="menu-section">
        <div class="section-heading">Otros</div>
        <ul class="static-menu-list">
          <li><i class="bi bi-chat-left-text"></i> Comentario</li>
          <li><i class="bi bi-trash"></i> Basura</li>
          <li><i class="bi bi-three-dots"></i> Más</li>
        </ul>
      </div>
    </div>
  </aside>

  <div class="main-editor-pane">
    
    <header class="top-toolbar">
      <div class="doc-title-row">
        <div class="title-left-group">
          <input 
            *ngIf="currentView === 'editor'"
            type="text" 
            [(ngModel)]="noteTitle" 
            (input)="onInputChange()" 
            placeholder="Documento sin título" 
            class="doc-title-input"
          />
          <span *ngIf="currentView === 'pdf'" class="static-view-title">Texto a PDF</span>
        </div>
        
        <div class="top-right-actions">
          <button class="icon-btn-search"><i class="bi bi-search"></i> Buscar... <span class="kbd">Ctrl K</span></button>
          <button class="icon-btn-top"><i class="bi bi-moon"></i></button>
          <button class="icon-btn-user"><i class="bi bi-person"></i></button>
        </div>
      </div>

      <div class="formatting-actions-bar">
        <button (click)="formatText('undo')" title="Deshacer"><i class="bi bi-arrow-counterclockwise"></i></button>
        <button (click)="formatText('redo')" title="Rehacer"><i class="bi bi-arrow-clockwise"></i></button>
        
        <span class="divider"></span>

        <select (change)="changeFont($event)" class="toolbar-select font-select">
          <option value="Arial">Arial</option>
          <option value="Courier New">Courier New</option>
          <option value="Georgia">Georgia</option>
          <option value="Times New Roman">Times New Roman</option>
        </select>

        <select (change)="changeSize($event)" class="toolbar-select size-select">
          <option value="3">Normal</option>
          <option value="1">Pequeño</option>
          <option value="5">Subtítulo</option>
          <option value="6">Título grande</option>
        </select>

        <span class="divider"></span>

        <button (click)="formatText('bold')" title="Negrita"><i class="bi bi-type-bold"></i></button>
        <button (click)="formatText('italic')" title="Cursiva"><i class="bi bi-type-italic"></i></button>
        <button (click)="formatText('underline')" title="Subrayado"><i class="bi bi-type-underline"></i></button>
        <button (click)="formatText('strikeThrough')" title="Tachado"><i class="bi bi-type-strikethrough"></i></button>
        <button (click)="formatText('code')" title="Código"><i class="bi bi-code-slash"></i></button>
        <button (click)="formatText('createLink', 'https://')" title="Enlace"><i class="bi bi-link-45deg"></i></button>

        <span class="divider"></span>

        <button (click)="formatText('justifyLeft')" title="Izquierda"><i class="bi bi-text-left"></i></button>
        <button (click)="formatText('justifyCenter')" title="Centrar"><i class="bi bi-text-center"></i></button>
        <button (click)="formatText('justifyRight')" title="Derecha"><i class="bi bi-text-right"></i></button>
        
        <span class="divider"></span>
        
        <button (click)="formatText('insertUnorderedList')" title="Lista"><i class="bi bi-list-task"></i></button>
      </div>
    </header>

    <div class="content-viewport" *ngIf="currentView === 'editor'">
      <div class="editor-paper-card">
        <div 
          id="wysiwyg-editor" 
          contenteditable="true" 
          (input)="onInputChange()"
          data-placeholder="Empieza a escribir, presiona '/' para comandos..."
          class="rich-text-area"
        ></div>
        
        <button class="ai-floating-btn" *ngIf="!noteTitle && !notesService.isLoading()">
          <i class="bi bi-stars"></i> Ayúdame a escribir
        </button>
      </div>
    </div>

    <div class="content-viewport pdf-view-bg" *ngIf="currentView === 'pdf'">
      <div class="pdf-paper-card">
        <textarea class="pdf-textarea" placeholder="Enter or paste your text here"></textarea>
        <button class="sample-doc-btn"><i class="bi bi-plus-lg"></i> Sample Document</button>
        
        <div class="pdf-action-center">
          <button class="btn-convert-pdf">Convert to PDF</button>
        </div>
      </div>
    </div>

    <footer class="editor-bottom-bar">
      <button class="footer-action-btn"><i class="bi bi-upload"></i> Subir Doc</button>
      
      <div class="cloud-status-center">
        <span *ngIf="isSaving()" class="status-text saving"><i class="bi bi-cloud-arrow-up"></i> Guardando cambios...</span>
        <span *ngIf="!isSaving() && selectedNote()" class="status-text saved"><i class="bi bi-cloud-check"></i> Guardado en la nube</span>
      </div>

      <div class="footer-right-actions">
        <button class="icon-btn-footer" title="Copiar"><i class="bi bi-copy"></i></button>
        <button class="icon-btn-footer" title="Descargar"><i class="bi bi-download"></i></button>
        <button class="icon-btn-footer danger" (click)="startNewNote()" title="Borrar lienzo"><i class="bi bi-trash3"></i></button>
      </div>
    </footer>
  </div>
</div>
